<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Code Map - Developer Resource Navigation, a curated collection of programming learning sites, tools and resources">
  <meta name="keywords" content="programming,development,resource navigation,learning,tools,coding,developer">
  <meta name="author" content="zhangboheng">
  <meta name="theme-color" content="#6366f1">
  
  <title>The Code Map 🔗 Developer Resource Navigation</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon-180x180.png">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <!-- Sidebar Toggle Bar (External) -->
    <div class="sidebar-toggle-bar" id="sidebarToggleBar">
      <button class="sidebar-toggle-btn" id="sidebarToggle" title="收起/展开侧边栏">
        ◀
      </button>
    </div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">🔗</div>
          <span class="logo-text">Code Map</span>
        </div>
      </div>
      
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Categories will be rendered by JavaScript -->
      </nav>
      
      <div class="sidebar-footer">
        <div class="copyright">
          <span>Design by 行运设计师</span>
          <a href="https://github.com/zhangboheng" target="_blank">© 2026 zhangboheng</a>
        </div>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <header class="content-header">
        <div class="content-title">
          <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
          <h1 id="currentCategory">全部资源</h1>
          <span class="content-count" id="linkCount">0 个链接</span>
        </div>
        <div class="header-actions">
          <div class="search-box-header">
            <input type="text" id="searchInput" placeholder="🔍 Search resources..." autocomplete="off">
            <div class="search-suggestions" id="searchSuggestions">
              <!-- Search suggestions will be rendered here -->
            </div>
          </div>
          <div class="language-switcher" id="languageSwitcher">
            <button class="lang-dropdown-btn" id="langDropdownBtn">
              <span class="lang-icon">🌐</span>
              <span class="lang-text" id="langDropdownText">Language</span>
              <span class="lang-arrow">▼</span>
            </button>
            <div class="lang-dropdown-menu" id="langDropdownMenu">
              <button class="lang-option active" data-lang="en">
                <span class="lang-icon">🇺🇸</span>
                <span class="lang-text">English</span>
              </button>
              <button class="lang-option" data-lang="zh">
                <span class="lang-icon">🇨🇳</span>
                <span class="lang-text">中文</span>
              </button>
              <button class="lang-option" data-lang="ja">
                <span class="lang-icon">🇯🇵</span>
                <span class="lang-text">日本語</span>
              </button>
              <button class="lang-option" data-lang="ko">
                <span class="lang-icon">🇰🇷</span>
                <span class="lang-text">한국어</span>
              </button>
              <button class="lang-option" data-lang="es">
                <span class="lang-icon">🇪🇸</span>
                <span class="lang-text">Español</span>
              </button>
              <button class="lang-option" data-lang="fr">
                <span class="lang-icon">🇫🇷</span>
                <span class="lang-text">Français</span>
              </button>
            </div>
          </div>
          <button class="theme-toggle" id="themeToggle">
            <span id="themeIcon">🌙</span>
            <span id="themeText">Dark Mode</span>
          </button>
          <button class="data-source-btn" id="dataSourceBtn" data-i18n-title="dataSourceSettings">
            <span class="status-dot local" id="dataSourceStatus"></span>
            <span data-i18n="dataSource">Data Source</span>
          </button>
        </div>
      </header>
      
      <div class="content-body">
        <div class="content-grid" id="contentGrid">
          <!-- Links will be rendered by JavaScript -->
        </div>
      </div>
    </main>
    
  </div>
  
  <!-- Return to Top Button -->
  <button class="return-top" id="returnTop" title="返回顶部">↑</button>
  
  <!-- Custom Link Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="customLinkModal">
      <div class="modal-header">
        <h3 id="modalTitle">添加自定义链接</h3>
        <button class="modal-close" id="modalClose" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="linkName">名称 <span class="required">*</span></label>
          <input type="text" id="linkName" placeholder="例如：GitHub" maxlength="50">
        </div>
        <div class="form-group">
          <label for="linkUrl">链接 <span class="required">*</span></label>
          <input type="url" id="linkUrl" placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label for="linkIcon">图标</label>
          <input type="text" id="linkIcon" placeholder="🔗 或留空使用默认图标" maxlength="10">
        </div>
        <div class="form-group">
          <label for="linkNote">备注</label>
          <textarea id="linkNote" placeholder="可选备注信息" maxlength="200" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="modalSave">保存</button>
      </div>
    </div>
  </div>
  
  <!-- Data Source Settings Modal -->
  <div class="data-source-overlay" id="dataSourceOverlay">
    <div class="data-source-modal">
      <div class="data-source-header">
        <h3 data-i18n="dataSourceSettings">Data Source Settings</h3>
        <button class="data-source-close" id="dataSourceClose">×</button>
      </div>
      <div class="data-source-body">
        <div class="sync-message" id="syncMessage"></div>
        
        <div class="source-options">
          <label class="source-option active" data-source="local">
            <input type="radio" name="dataSource" value="local" checked>
            <div class="source-option-icon">📁</div>
            <div class="source-option-content">
              <div class="source-option-title" data-i18n="localData">Local Data</div>
              <div class="source-option-desc" data-i18n="localDataDesc">Use local JSON file, fast and stable</div>
            </div>
          </label>
          <label class="source-option" data-source="github">
            <input type="radio" name="dataSource" value="github">
            <div class="source-option-icon">🐙</div>
            <div class="source-option-content">
              <div class="source-option-title" data-i18n="githubDataSource">GitHub Data Source</div>
              <div class="source-option-desc" data-i18n="githubDataSourceDesc">Sync data from GitHub repository</div>
            </div>
          </label>
        </div>
        
        <div class="github-config" id="githubConfig">
          <div class="github-config-title" data-i18n="githubConfig">GitHub Configuration</div>
          <div class="github-config-method">
            <button class="method-btn active" data-method="raw">Raw URL</button>
            <button class="method-btn" data-method="api">API</button>
            <button class="method-btn" data-method="gist">Gist</button>
          </div>
          <div class="config-input" id="rawUrlConfig">
            <label data-i18n="rawFileUrl">Raw File URL</label>
            <input type="url" id="githubRawUrl" placeholder="https://raw.githubusercontent.com/user/repo/main/data/links.json">
          </div>
          <div class="config-input" id="apiConfig" style="display:none;">
            <label data-i18n="repoOwner">Repository Owner</label>
            <input type="text" id="githubOwner" placeholder="username">
          </div>
          <div class="config-input" id="apiConfig2" style="display:none;">
            <label data-i18n="repoName">Repository Name</label>
            <input type="text" id="githubRepo" placeholder="repository-name">
          </div>
          <div class="config-input" id="gistConfig" style="display:none;">
            <label data-i18n="gistId">Gist ID</label>
            <input type="text" id="githubGistId" placeholder="abc123...">
          </div>
          <div class="config-input">
            <label data-i18n="githubToken">GitHub Token (optional)</label>
            <input type="password" id="githubTokenInput" data-i18n-placeholder="githubTokenPlaceholder" placeholder="ghp_xxxx to increase API limits">
          </div>
        </div>
        
        <div class="status-section">
          <div class="status-title" data-i18n="statusInfo">Status Information</div>
          <div class="status-grid">
            <div class="status-item">
              <span class="status-dot valid" id="cacheStatusDot"></span>
              <span data-i18n="cacheStatus">Cache Status</span>
            </div>
            <div class="status-item">
              <span class="status-dot" id="backupStatusDot"></span>
              <span data-i18n="offlineBackup">Offline Backup</span>
            </div>
          </div>
          <div class="rate-limit-info" id="rateLimitInfo" style="display:none;">
            <span data-i18n="apiLimit">API Limit</span>
            <div class="rate-limit-bar">
              <div class="rate-limit-bar-fill" id="rateLimitBar" style="width: 100%"></div>
            </div>
            <span id="rateLimitText">5000/5000</span>
          </div>
        </div>
        
        <div class="data-source-actions">
          <button class="btn btn-secondary" id="clearCacheBtn" data-i18n="clearCache">Clear Cache</button>
          <button class="btn btn-primary" id="syncDataBtn">
            <span id="syncBtnText" data-i18n="syncData">Sync Data</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Export/Import Modal -->
  <div class="modal-overlay" id="exportImportOverlay">
    <div class="modal modal-sm" id="exportImportModal">
      <div class="modal-header">
        <h3 id="exportImportTitle">导出/导入链接</h3>
        <button class="modal-close" id="exportImportClose" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="export-import-actions">
          <button class="btn btn-primary" id="exportBtn">📤 导出链接</button>
          <button class="btn btn-secondary" id="importBtn">📥 导入链接</button>
          <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>
        <div class="export-import-info" id="exportImportInfo"></div>
      </div>
    </div>
  </div>
  
  <!-- Module Scripts (must be loaded in order) -->
  <script src="js/modules/state.js"></script>
  <script src="js/modules/i18n.js"></script>
  <script src="js/modules/search.js"></script>
  <script src="js/modules/render.js"></script>
  <script src="js/modules/dataLoader.js"></script>
  <script src="js/modules/dataSourceUI.js"></script>
  <!-- Fallback Data (loaded synchronously for initial render) -->
  <script src="js/data.js"></script>
  <!-- Main App -->
  <script src="js/app.js"></script>
</body>
</html>
